name: inventory
description: Mini Inventory — Flutter + Firebase.
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7
  provider: ^6.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  package_info_plus: ^10.1.0
  fl_chart: ^0.68.0
  http: ^1.2.2
  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
  assets:
    - .env
